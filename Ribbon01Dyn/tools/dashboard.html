<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Theme Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f1f5f9; }
        .control-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #fff; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .controls { display: flex; gap: 10px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 200px; }
        .preview-container { flex-grow: 1; padding: 20px; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); background: #fff; }
    </style>
</head>
<body>

    <div class="control-bar">
        <div style="font-weight: bold; font-size: 1.2rem;">Customization Portal: Theme Preview</div>
        <div class="controls">
            <select id="theme-selector">
                <option value="default">Default Dark</option>
                <option value="BlackBlue01">BlackBlue01 (Warm Orange)</option>
            </select>
        </div>
    </div>

    <div class="preview-container">
        <iframe id="site-preview" src="../index.html?theme=default"></iframe>
    </div>

    <script>
        const selector = document.getElementById('theme-selector');
        const iframe = document.getElementById('site-preview');

        selector.addEventListener('change', () => {
            // We only send the theme name now, script.js handles the pathing
            iframe.src = `../index.html?theme=${selector.value}`;
        });
    </script>
</body>
</html>
